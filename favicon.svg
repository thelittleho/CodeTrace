<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 클로드 주황 배경 (둥근 사각형) -->
  <rect width="100" height="100" rx="30" fill="#D97706" />
  
  <!-- 중앙의 코어 (Code/Data) -->
  <circle cx="50" cy="50" r="14" fill="white" />
  
  <!-- 기울어진 메인 궤도 (Trace Orbit) -->
  <ellipse cx="50" cy="50" rx="42" ry="16" stroke="white" stroke-width="10" fill="none" transform="rotate(-35 50 50)" />
  
  <!-- 궤도 위의 추적 포인트 (The Trace) -->
  <circle cx="84" cy="26" r="8" fill="white" />
</svg>
